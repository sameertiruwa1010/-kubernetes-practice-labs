apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment-1
  namespace: service-lab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-1
  template:
    metadata:
      labels:
        app: nginx-1
    spec:
      containers:
      - name: nginx
        image: nginx
        ports:
        - containerPort: 80
---

apiVersion: v1
kind: Service
metadata:
  name: nginx-clusterip-1
  namespace: service-lab
spec:
  type: ClusterIP
  selector:
    app: nginx-1
  ports:
    - port: 80
      targetPort: 80

